                      {item.titulo}
                    </h3>
                    <p style={{ fontSize: '1.1rem', lineHeight: 1.8, color: '#636e72' }}>
                      {item.contenido}
                    </p>
                  </div>
                ))}

                <div style={{
                  background: 'linear-gradient(135deg, #a29bfe, #6c5ce7)',
                  borderRadius: '12px',
                  padding: '2.5rem',
                  color: 'white',
                  marginTop: '2rem'
                }}>
                  <h3 style={{ fontSize: '2rem', marginBottom: '1rem' }}>Tres pilares de la inclusión</h3>
                  <div style={{ display: 'grid', gap: '1rem', fontSize: '1.1rem' }}>
                    <div>
                      <strong>PRESENCIA</strong><br />
                      ¿Cómo pasamos de la presencia física a una presencia plena en la vida del aula?
                    </div>
                    <div>
                      <strong>PARTICIPACIÓN</strong><br />
                      ¿Cómo pensamos las interacciones entre estudiantes y las dinámicas de trabajo en clase?
                    </div>
                    <div>
                      <strong>LOGROS</strong><br />
                      ¿Qué aprendizajes consideramos valiosos y cómo evaluamos esos procesos?
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* ESTUDIANTES */}
            {activeSection === 'estudiantes' && (
              <div style={{ animation: 'fadeIn 0.5s ease' }}>
                <h2 style={{ fontSize: '2.5rem', color: '#2d3436', marginBottom: '2rem', fontWeight: 700 }}>
                  Conociendo a nuestros estudiantes
                </h2>

                {/* Selector */}
                <div style={{ display: 'flex', gap: '1rem', marginBottom: '2rem' }}>
                  <button
                    onClick={() => setSelectedStudent('leila')}
                    style={{
                      flex: 1,
                      padding: '1.5rem',
                      border: `3px solid ${selectedStudent === 'leila' ? '#e17055' : '#dfe6e9'}`,
                      background: selectedStudent === 'leila' ? '#e17055' : 'white',
                      color: selectedStudent === 'leila' ? 'white' : '#2d3436',
                      borderRadius: '12px',
                      cursor: 'pointer',
                      fontSize: '1.3rem',
                      fontWeight: 600,
                      transition: 'all 0.3s ease'
                    }}
                  >
                    Leila - 6°B
                  </button>
                  <button
                    onClick={() => setSelectedStudent('salvador')}
                    style={{
                      flex: 1,
                      padding: '1.5rem',
                      border: `3px solid ${selectedStudent === 'salvador' ? '#00b894' : '#dfe6e9'}`,
                      background: selectedStudent === 'salvador' ? '#00b894' : 'white',
                      color: selectedStudent === 'salvador' ? 'white' : '#2d3436',
                      borderRadius: '12px',
                      cursor: 'pointer',
                      fontSize: '1.3rem',
                      fontWeight: 600,
                      transition: 'all 0.3s ease'
                    }}
                  >
                    Salvador - 6°C
                  </button>
                </div>

                {/* Perfil del estudiante */}
                <div style={{
                  background: 'white',
                  borderRadius: '16px',
                  padding: '2.5rem',
                  boxShadow: '0 10px 40px rgba(0,0,0,0.1)',
                  borderTop: `6px solid ${currentStudent.color}`
                }}>
                  <h3 style={{ fontSize: '2.2rem', color: currentStudent.color, marginBottom: '2rem', fontWeight: 700 }}>
                    {currentStudent.name} - {currentStudent.curso}
                  </h3>

                  {/* Apoyos necesarios */}
                  <div style={{ marginBottom: '2rem' }}>
                    <h4 style={{ fontSize: '1.6rem', color: '#2d3436', marginBottom: '1rem', fontWeight: 600 }}>
                      Apoyos necesarios
                    </h4>
                    <ul style={{ listStyle: 'none', padding: 0 }}>
                      {currentStudent.apoyos.map((apoyo, idx) => (
                        <li key={idx} style={{
                          padding: '1rem',
                          background: '#f8f9fa',
                          borderRadius: '8px',
                          marginBottom: '0.75rem',
                          borderLeft: `4px solid ${currentStudent.color}`,
                          fontSize: '1.1rem',
                          color: '#2d3436',
                          display: 'flex',
                          alignItems: 'flex-start',
                          gap: '0.75rem'
                        }}>
                          <Icon name="CheckCircle" size={20} style={{ color: currentStudent.color, flexShrink: 0, marginTop: '0.2rem' }} />
                          <span>{apoyo}</span>
                        </li>
                      ))}
                    </ul>
                  </div>

                  {/* Fortalezas */}
                  <div style={{ marginBottom: '2rem' }}>
                    <h4 style={{ fontSize: '1.6rem', color: '#2d3436', marginBottom: '1rem', fontWeight: 600 }}>
                      Fortalezas e intereses
                    </h4>
                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: '1rem' }}>
                      {currentStudent.fortalezas.map((fortaleza, idx) => (
                        <div key={idx} style={{
                          padding: '1rem',
                          background: `${currentStudent.color}15`,
                          borderRadius: '8px',
                          fontSize: '1rem',
                          color: '#2d3436',
                          border: `2px solid ${currentStudent.color}30`,
                          display: 'flex',
                          alignItems: 'flex-start',
                          gap: '0.5rem'
                        }}>
                          <Icon name="Sparkles" size={16} style={{ color: currentStudent.color, flexShrink: 0, marginTop: '0.2rem' }} />
                          <span>{fortaleza}</span>
                        </div>
                      ))}
                    </div>
                  </div>

                  {/* Consideraciones */}
                  <div>
                    <h4 style={{ fontSize: '1.6rem', color: '#2d3436', marginBottom: '1rem', fontWeight: 600 }}>
                      Consideraciones importantes
                    </h4>
                    <ul style={{ listStyle: 'none', padding: 0 }}>
                      {currentStudent.consideraciones.map((consideracion, idx) => (
                        <li key={idx} style={{
                          padding: '1rem',
                          background: '#fff3cd',
                          borderRadius: '8px',
                          marginBottom: '0.75rem',
                          borderLeft: '4px solid #ffc107',
                          fontSize: '1.1rem',
                          color: '#856404'
                        }}>
                          {consideracion}
                        </li>
                      ))}
                    </ul>
                  </div>
                </div>
              </div>
            )}

            {/* ADAPTADOR DE TAREAS */}
            {activeSection === 'adaptador' && (
              <AdaptadorInteractivo 
                selectedStudent={selectedStudent}
                setSelectedStudent={setSelectedStudent}
                currentStudent={currentStudent}
              />
            )}

            {/* PREGUNTAS GUÍA */}
            {activeSection === 'preguntas' && (
              <div style={{ animation: 'fadeIn 0.5s ease' }}>
                <h2 style={{ fontSize: '2.5rem', color: '#2d3436', marginBottom: '2rem', fontWeight: 700 }}>
                  Preguntas Guía para la Enseñanza
                </h2>

                {[
                  {
                    categoria: "Sobre el estudiante",
                    preguntas: [
                      "¿Cuáles son nuestras miradas sobre estudiantes con discapacidad?",
                      "¿Qué es lo que los/as estudiantes conocen? ¿Cómo conocen?",
                      "¿Qué idea tienen sobre sí como estudiantes?",
                      "¿Cómo se vinculan sus visiones de sí como jóvenes y como estudiantes?"
                    ]
                  },
                  {
                    categoria: "Sobre la enseñanza",
                    preguntas: [
                      "¿Cómo pensamos los contenidos a enseñar?",
                      "¿Qué aspectos de los contenidos vamos a desarrollar?",
                      "¿Quiénes pueden ayudarnos a planificar las clases?",
                      "¿Cómo pensamos lo colectivo en el aula?"
                    ]
                  },
                  {
                    categoria: "Sobre los apoyos",
                    preguntas: [
                      "¿Qué pensamos que necesitan? ¿Qué necesitamos nosotros/as?",
                      "¿De qué forma podemos usar tecnología como apoyo?",
                      "¿Cómo podemos colaborar para que se sientan seguros/as?",
                      "¿Cómo favorecemos vínculos sociales con compañeros/as?"
                    ]
                  },
                  {
                    categoria: "Sobre las familias",
                    preguntas: [
                      "¿Cómo pensamos el vínculo con las familias?",
                      "¿En qué medida podemos generar colaboración con ellas?",
                      "¿Qué información necesitan las familias de nosotros?"
                    ]
                  }
                ].map((seccion, idx) => (
                  <div key={idx} style={{
                    background: 'white',
                    borderRadius: '12px',
                    padding: '2rem',
                    marginBottom: '1.5rem',
                    boxShadow: '0 4px 20px rgba(0,0,0,0.08)',
                    borderLeft: `5px solid ${['#74b9ff', '#fd79a8', '#00b894', '#ffeaa7'][idx % 4]}`
                  }}>
                    <h3 style={{ fontSize: '1.6rem', color: '#2d3436', marginBottom: '1.5rem', fontWeight: 600 }}>
                      {seccion.categoria}
                    </h3>
                    <ul style={{ listStyle: 'none', padding: 0 }}>
                      {seccion.preguntas.map((pregunta, qIdx) => (
                        <li key={qIdx} style={{
                          padding: '1rem',
                          background: '#f8f9fa',
                          borderRadius: '8px',
                          marginBottom: '0.75rem',
                          fontSize: '1.1rem',
                          color: '#2d3436',
                          display: 'flex',
                          alignItems: 'flex-start',
                          gap: '0.75rem'
                        }}>
                          <Icon name="CheckCircle" size={20} style={{ color: ['#74b9ff', '#fd79a8', '#00b894', '#ffeaa7'][idx % 4], flexShrink: 0, marginTop: '0.2rem' }} />
                          <span>{pregunta}</span>
                        </li>
                      ))}
                    </ul>
                  </div>
                ))}

                <div style={{
                  background: 'linear-gradient(135deg, #6c5ce7, #a29bfe)',
                  borderRadius: '12px',
                  padding: '2rem',
                  color: 'white',
                  marginTop: '2rem'
                }}>
                  <h3 style={{ fontSize: '1.8rem', marginBottom: '1rem' }}>Recordá siempre:</h3>
                  <ul style={{ fontSize: '1.1rem', lineHeight: 1.8, paddingLeft: '1.5rem' }}>
                    <li>Escuchar a los estudiantes: preguntarles directamente</li>
                    <li>Hablar con naturalidad sobre los apoyos</li>
                    <li>Recuperar la diferencia como algo neutral o positivo</li>
                    <li>Revisar tiempos escolares y flexibilizarlos cuando sea necesario</li>
                  </ul>
                </div>
              </div>
            )}
          </main>
        </div>
      );
    }

    // Renderizar la aplicación
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<EducacionInclusiva />);
  </script>
</body>
</html>
